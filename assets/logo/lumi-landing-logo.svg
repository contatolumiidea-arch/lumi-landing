<svg viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LUMI LANDING">
  <!-- House + LL monogram icon -->
  <g transform="translate(4, 4)">
    <!-- Roof triangle peak -->
    <polygon points="20,2 36,14 4,14" fill="#D4AF37"/>
    <!-- Left L: vertical bar -->
    <rect x="4" y="13" width="5" height="22" fill="#D4AF37"/>
    <!-- Left L: horizontal bar at bottom -->
    <rect x="4" y="30" width="14" height="5" fill="#D4AF37"/>
    <!-- Right L (mirrored): vertical bar -->
    <rect x="31" y="13" width="5" height="22" fill="#D4AF37"/>
    <!-- Right L (mirrored): horizontal bar at bottom -->
    <rect x="22" y="30" width="14" height="5" fill="#D4AF37"/>
  </g>
  <!-- Wordmark -->
  <text x="54" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="2">LUMI</text>
  <text x="54" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="400" fill="#D4AF37" letter-spacing="3">LANDING</text>
</svg>
