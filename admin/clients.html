<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes — LUMI Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <meta name="robots" content="noindex, nofollow">
</head>
<body>

<div class="admin-layout">
  <div id="admin-sidebar-mount"></div>

  <div class="admin-main">
    <div class="admin-topbar">
      <span class="topbar-title" id="topbar-title">Clientes LUMI</span>
      <span class="topbar-breadcrumb" id="topbar-crumb"></span>
    </div>

    <div class="admin-content">

      <!-- LIST VIEW -->
      <div id="view-list">
        <div class="filter-bar">
          <input class="filter-input" id="search" type="text" placeholder="Buscar por nome, email ou empresa..." oninput="onSearch()">
          <select class="filter-select" id="filter-status" onchange="loadClients()">
            <option value="">Todos os status</option>
            <option value="new">Novo cliente</option>
            <option value="pending_onboarding">Aguard. onboarding</option>
            <option value="in_production">Em produção</option>
            <option value="review">Revisão</option>
            <option value="published">Publicado</option>
            <option value="canceled">Cancelado</option>
          </select>
        </div>

        <div class="section-header">
          <span class="section-title">Corretores</span>
          <span class="section-count" id="total-count">—</span>
          <span class="section-spacer"></span>
        </div>

        <div class="table-wrap">
          <div class="table-wrap-scroll">
            <table>
              <thead>
                <tr>
                  <th>Corretor</th>
                  <th>Empresa</th>
                  <th>País</th>
                  <th>Plano</th>
                  <th>Status</th>
                  <th>Assinatura</th>
                  <th>Compra</th>
                </tr>
              </thead>
              <tbody id="clients-tbody">
                <tr><td colspan="7"><div class="loading"><div class="spinner"></div> Carregando...</div></td></tr>
              </tbody>
            </table>
          </div>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>

      <!-- DETAIL VIEW -->
      <div id="view-detail" style="display:none;">
        <div style="margin-bottom:16px;">
          <button class="btn btn-outline btn-sm" onclick="showList()">← Voltar para clientes</button>
        </div>

        <div class="detail-grid" id="detail-cards">
          <div class="loading"><div class="spinner"></div></div>
        </div>

        <div class="section-header" style="margin-top:20px;">
          <span class="section-title">Dados do Onboarding</span>
        </div>
        <div class="table-wrap" id="onboarding-wrap">
          <div class="loading"><div class="spinner"></div></div>
        </div>

        <div class="section-header" style="margin-top:20px;">
          <span class="section-title">Leads Recebidos</span>
          <span class="section-count" id="leads-count">—</span>
        </div>
        <div class="table-wrap" id="leads-wrap">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Edit Status Modal -->
<div class="modal-overlay" id="modal-status" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Atualizar Status</div>
    <div class="field-group">
      <label class="field-label">Status do cliente</label>
      <select class="field-select" id="edit-status">
        <option value="new">Novo cliente</option>
        <option value="pending_onboarding">Aguardando onboarding</option>
        <option value="in_production">Em produção</option>
        <option value="review">Revisão</option>
        <option value="published">Publicado</option>
        <option value="canceled">Cancelado</option>
      </select>
    </div>
    <div class="field-group">
      <label class="field-label">URL da Landing Page (ao publicar)</label>
      <input class="field-input" id="edit-url" type="url" placeholder="https://...">
    </div>
    <div class="field-group">
      <label class="field-label">Notas internas</label>
      <textarea class="field-textarea" id="edit-notes" placeholder="Observações da equipe LUMI..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveStatus()">Salvar</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
let currentPage = 1;
let searchTimeout;
let currentClientId;

(async () => {
  renderLayout('clients');
  await requireAuth();

  // Check if opening a specific client from URL
  const params = new URLSearchParams(window.location.search);
  if (params.get('id')) {
    await showDetail(params.get('id'));
  } else {
    await loadClients();
  }
})();

async function loadClients(page = 1) {
  currentPage = page;
  const status = document.getElementById('filter-status').value;
  const search = document.getElementById('search').value.trim();

  const params = new URLSearchParams({ page, limit: 25 });
  if (status) params.set('status', status);
  if (search) params.set('search', search);

  const tbody = document.getElementById('clients-tbody');
  tbody.innerHTML = `<tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr>`;

  const data = await API.get(`/admin/clients?${params}`);
  if (!data) return;

  document.getElementById('total-count').textContent = data.total ?? 0;

  if (!data.clients?.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">👤</div>Nenhum cliente encontrado.</div></td></tr>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = data.clients.map(c => {
    const sub = c.lumi_subscriptions?.[0];
    return `
      <tr onclick="showDetail('${c.id}')">
        <td>
          <div class="td-name">${c.full_name}</div>
          <div class="td-sub">${c.email}</div>
        </td>
        <td>${c.business_name || '—'}</td>
        <td>${c.country || '—'}</td>
        <td>${sub ? pillHTML(sub.plan_type) : '—'}</td>
        <td>${pillHTML(c.client_status)}</td>
        <td>${sub ? pillHTML(sub.status) : '—'}</td>
        <td class="td-date">${fmtDate(c.purchased_at)}</td>
      </tr>`;
  }).join('');

  // Pagination
  const totalPages = Math.ceil(data.total / 25);
  document.getElementById('pagination').innerHTML = totalPages > 1 ? `
    <span>${(page-1)*25+1}–${Math.min(page*25, data.total)} de ${data.total}</span>
    <button class="btn btn-outline" onclick="loadClients(${page-1})" ${page<=1?'disabled':''}>‹ Anterior</button>
    <button class="btn btn-outline" onclick="loadClients(${page+1})" ${page>=totalPages?'disabled':''}>Próximo ›</button>
  ` : '';
}

function onSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => loadClients(1), 350);
}

async function showDetail(id) {
  currentClientId = id;
  document.getElementById('view-list').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  document.getElementById('topbar-title').textContent = 'Clientes LUMI';
  document.getElementById('topbar-crumb').textContent = '/ Detalhes';

  const data = await API.get(`/admin/client?id=${id}`);
  if (!data) return;

  const { client, onboarding, leads } = data;
  const sub = client.lumi_subscriptions?.[0];
  const page = client.landing_pages?.[0];

  // Info cards
  document.getElementById('detail-cards').innerHTML = `
    <div class="detail-card">
      <div class="detail-card-title">Informações do Corretor</div>
      <div class="detail-row"><span class="detail-key">Nome</span><span class="detail-val">${client.full_name}</span></div>
      <div class="detail-row"><span class="detail-key">Email</span><span class="detail-val">${client.email}</span></div>
      <div class="detail-row"><span class="detail-key">Telefone</span><span class="detail-val">${client.phone || '—'}</span></div>
      <div class="detail-row"><span class="detail-key">Empresa</span><span class="detail-val">${client.business_name || '—'}</span></div>
      <div class="detail-row"><span class="detail-key">País</span><span class="detail-val">${client.country}</span></div>
      <div class="detail-row"><span class="detail-key">Comprou em</span><span class="detail-val">${fmtDatetime(client.purchased_at)}</span></div>
      <div class="detail-row"><span class="detail-key">Onboarding</span><span class="detail-val">${client.onboarding_completed_at ? fmtDate(client.onboarding_completed_at) : 'Pendente'}</span></div>
    </div>
    <div class="detail-card">
      <div class="detail-card-title">Status e Assinatura</div>
      <div class="detail-row"><span class="detail-key">Status</span><span class="detail-val">${pillHTML(client.client_status)}</span></div>
      <div class="detail-row"><span class="detail-key">Plano</span><span class="detail-val">${sub ? pillHTML(sub.plan_type) : '—'}</span></div>
      <div class="detail-row"><span class="detail-key">Assinatura</span><span class="detail-val">${sub ? pillHTML(sub.status) : '—'}</span></div>
      <div class="detail-row"><span class="detail-key">Renova em</span><span class="detail-val">${sub?.current_period_end ? fmtDate(sub.current_period_end) : '—'}</span></div>
      <div class="detail-row"><span class="detail-key">Landing Page</span><span class="detail-val">${page?.published_url ? `<a href="${page.published_url}" target="_blank" style="color:var(--gold)">${page.published_url}</a>` : pillHTML(page?.status || 'draft')}</span></div>
      <div class="detail-row"><span class="detail-key">Notas</span><span class="detail-val">${client.notes || '—'}</span></div>
      <div style="margin-top:12px;">
        <button class="btn btn-primary btn-sm" onclick="openStatusModal('${client.client_status}', '${client.notes || ''}', '${page?.published_url || ''}')">Editar status</button>
      </div>
    </div>
  `;

  // Onboarding summary
  if (onboarding) {
    const b = onboarding.step1_business || {};
    document.getElementById('onboarding-wrap').innerHTML = `
      <table>
        <thead><tr><th>Campo</th><th>Valor</th></tr></thead>
        <tbody>
          <tr><td>Nome completo</td><td>${b.fullName || '—'}</td></tr>
          <tr><td>Empresa</td><td>${b.businessName || '—'}</td></tr>
          <tr><td>Licença</td><td>${b.license || '—'}</td></tr>
          <tr><td>WhatsApp</td><td>${b.whatsapp || '—'}</td></tr>
          <tr><td>Idiomas</td><td>${(onboarding.step4_languages || []).join(', ') || '—'}</td></tr>
          <tr><td>Template</td><td>${onboarding.step2_template?.selected || '—'}</td></tr>
          <tr><td>Step atual</td><td>${onboarding.current_step} / 9</td></tr>
          <tr><td>Status</td><td>${pillHTML(onboarding.status)}</td></tr>
        </tbody>
      </table>`;
  } else {
    document.getElementById('onboarding-wrap').innerHTML = `<div class="empty"><div class="empty-icon">📋</div>Onboarding não iniciado.</div>`;
  }

  // Leads
  document.getElementById('leads-count').textContent = leads?.length || 0;
  if (leads?.length) {
    document.getElementById('leads-wrap').innerHTML = `
      <table>
        <thead><tr><th>Nome</th><th>Email</th><th>Telefone</th><th>Origem</th><th>Data</th></tr></thead>
        <tbody>
          ${leads.map(l => `
            <tr>
              <td>${l.lead_name || '—'}</td>
              <td class="td-mono">${l.lead_email || '—'}</td>
              <td class="td-mono">${l.lead_phone || '—'}</td>
              <td>${pillHTML(l.origin)}</td>
              <td class="td-date">${fmtDatetime(l.created_at)}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  } else {
    document.getElementById('leads-wrap').innerHTML = `<div class="empty"><div class="empty-icon">📊</div>Nenhum lead gerado ainda.</div>`;
  }
}

function showList() {
  document.getElementById('view-detail').style.display = 'none';
  document.getElementById('view-list').style.display = 'block';
  document.getElementById('topbar-crumb').textContent = '';
  history.replaceState(null, '', '/admin/clients.html');
}

function openStatusModal(status, notes, url) {
  document.getElementById('edit-status').value = status;
  document.getElementById('edit-notes').value = notes;
  document.getElementById('edit-url').value = url;
  document.getElementById('modal-status').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-status').style.display = 'none';
}

async function saveStatus() {
  const body = {
    client_status:    document.getElementById('edit-status').value,
    notes:            document.getElementById('edit-notes').value,
    landing_page_url: document.getElementById('edit-url').value || undefined,
  };
  const result = await API.patch(`/admin/client?id=${currentClientId}`, body);
  if (result?.ok) {
    closeModal();
    toast('Status atualizado.', 'success');
    await showDetail(currentClientId);
  } else {
    toast(result?.error || 'Erro ao salvar.', 'error');
  }
}
</script>
</body>
</html>
