<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads — LUMI Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <meta name="robots" content="noindex, nofollow">
</head>
<body>

<div class="admin-layout">
  <div id="admin-sidebar-mount"></div>

  <div class="admin-main">
    <div class="admin-topbar">
      <span class="topbar-title">Leads dos Corretores</span>
    </div>

    <div class="admin-content">
      <div class="filter-bar">
        <select class="filter-select" id="filter-origin" onchange="loadLeads(1)">
          <option value="">Todas as origens</option>
          <option value="buyer_guide">Guia comprador</option>
          <option value="seller_guide">Guia vendedor</option>
          <option value="contact_form">Formulário contato</option>
          <option value="whatsapp">WhatsApp</option>
          <option value="sms">SMS</option>
          <option value="email">Email</option>
        </select>
        <select class="filter-select" id="filter-status" onchange="loadLeads(1)">
          <option value="">Todos os status</option>
          <option value="new">Novo</option>
          <option value="contacted">Contactado</option>
          <option value="converted">Convertido</option>
          <option value="lost">Perdido</option>
        </select>
      </div>

      <div class="section-header">
        <span class="section-title">Leads Gerados</span>
        <span class="section-count" id="total-count">—</span>
      </div>

      <div class="table-wrap">
        <div class="table-wrap-scroll">
          <table>
            <thead>
              <tr>
                <th>Lead</th>
                <th>Telefone</th>
                <th>Origem</th>
                <th>Corretor</th>
                <th>Status</th>
                <th>Data</th>
              </tr>
            </thead>
            <tbody id="leads-tbody">
              <tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
(async () => {
  renderLayout('leads');
  await requireAuth();
  await loadLeads(1);
})();

async function loadLeads(page = 1) {
  const origin = document.getElementById('filter-origin').value;
  const status = document.getElementById('filter-status').value;

  const params = new URLSearchParams({ page, limit: 50 });
  if (origin) params.set('origin', origin);
  if (status) params.set('status', status);

  const tbody = document.getElementById('leads-tbody');
  tbody.innerHTML = `<tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>`;

  const data = await API.get(`/admin/leads?${params}`);
  if (!data) return;

  document.getElementById('total-count').textContent = data.total ?? 0;

  if (!data.leads?.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty"><div class="empty-icon">📊</div>Nenhum lead encontrado.</div></td></tr>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = data.leads.map(l => `
    <tr>
      <td>
        <div class="td-name">${l.lead_name || '—'}</div>
        <div class="td-sub">${l.lead_email || ''}</div>
      </td>
      <td class="td-mono">${l.lead_phone || '—'}</td>
      <td>${pillHTML(l.origin)}</td>
      <td>
        ${l.lumi_clients ? `<div class="td-name">${l.lumi_clients.full_name}</div><div class="td-sub">${l.lumi_clients.email}</div>` : '—'}
      </td>
      <td>${pillHTML(l.status)}</td>
      <td class="td-date">${fmtDatetime(l.created_at)}</td>
    </tr>
  `).join('');

  const totalPages = Math.ceil(data.total / 50);
  document.getElementById('pagination').innerHTML = totalPages > 1 ? `
    <span>${(page-1)*50+1}–${Math.min(page*50, data.total)} de ${data.total}</span>
    <button class="btn btn-outline" onclick="loadLeads(${page-1})" ${page<=1?'disabled':''}>‹ Anterior</button>
    <button class="btn btn-outline" onclick="loadLeads(${page+1})" ${page>=totalPages?'disabled':''}>Próximo ›</button>
  ` : '';
}
</script>
</body>
</html>
